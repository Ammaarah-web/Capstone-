{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="margin-top: 100px;">
    <h2 style="margin-top: 40px;">Register</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Register</button>
        <a href="{% url 'login' %}" class="btn btn-secondary ml-2">Back to Login</a>
    </form>
</div>
{% endblock %}
