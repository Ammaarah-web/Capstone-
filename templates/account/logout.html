{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="homepage-bg"></div>
<div class="background-overlay"></div>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">Sign Out</h1>
        <p class="auth-subtitle">Are you sure you want to log out?</p>

        <form method="post" action="{% url 'account_logout' %}" class="auth-form">
            {% csrf_token %}
            <button type="submit" class="main-btn auth-btn">Logout</button>
        </form>
    </div>
</div>
{% endblock %}
