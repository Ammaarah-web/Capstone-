{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="margin-top: 100px;">
    <h2 style="margin-top: 40px;">Dashboard</h2>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="{% url 'add_expense' %}" class="btn btn-primary">Add New Expense</a>
    </div>
    <h4>Total Spending: £{{ total_spending }}</h4>
    <div class="row mb-4">
        <div class="col-md-8 mb-4">
            <div class="card shadow-sm p-3">
                <div style="max-width: 100%;">
                    <canvas id="lineChart" width="600" height="300"></canvas>
                </div>
                <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
                <script>
                    const chartDates = {{ chart_dates|safe }};
                    const chartTotals = {{ chart_totals|safe }};
                    const ctx = document.getElementById('lineChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: chartDates,
                            datasets: [{
                                label: 'Daily Spending',
                                data: chartTotals,
                                borderColor: '#36A2EB',
                                backgroundColor: 'rgba(54,162,235,0.15)',
                                fill: true,
                                tension: 0.3
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    display: true,
                                },
                                title: {
                                    display: true,
                                    text: 'Spending Over Time'
                                }
                            },
                            scales: {
                                x: {
                                    ticks: {
                                        maxTicksLimit: 6
                                    }
                                },
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                </script>
            </div>
        </div>
    </div>
</div>
{% endblock %}
