{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 400px;">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <a href="{% url 'register' %}" class="btn btn-link mt-2">Create an account</a>
</div>
{% endblock %}
