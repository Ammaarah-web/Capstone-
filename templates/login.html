{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="margin-top: 100px;">
    <h2 style="margin-top: 40px;">Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <a href="{% url 'account_signup' %}" class="btn btn-success mt-2">Create an account</a>
</div>
{% endblock %}
