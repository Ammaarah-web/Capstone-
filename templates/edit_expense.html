{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="margin-top: 100px;">
    <h2 style="margin-top: 40px;">Edit Expense</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-warning">Update Expense</button>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary ml-2">Back to Dashboard</a>
    </form>
</div>
{% endblock %}
