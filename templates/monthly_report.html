{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="margin-top: 100px;">
    <h2 style="margin-top: 40px;">Monthly Spending Report</h2>
    <form method="get" class="mb-3">
        <label for="year">Select Year:</label>
        <select name="year" id="year" onchange="this.form.submit()">
            {% for year in available_years %}
                <option value="{{ year }}" {% if year == selected_year %}selected{% endif %}>{{ year }}</option>
            {% endfor %}
        </select>
    </form>
    <div class="mb-4" style="overflow-x: auto;">
        <div style="min-width: 600px; width: 1200px;">
            <canvas id="monthlyBarChart" width="1200" height="300"></canvas>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const monthlyLabels = {{ monthly_labels|safe }};
        const monthlyData = {{ monthly_data|safe }};
        const ctx = document.getElementById('monthlyBarChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: monthlyLabels,
                datasets: [{
                    label: 'Total Spending (£)',
                    data: monthlyData,
                    backgroundColor: '#36A2EB',
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: false,
                    },
                    title: {
                        display: true,
                        text: 'Monthly Spending'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
    <table class="table table-bordered mt-4">
        <thead>
            <tr>
                <th>Month</th>
                <th>Total Spending</th>
            </tr>
        </thead>
        <tbody>
            {% for item in monthly_list %}
            <tr>
                <td>{{ item.label }}</td>
                <td>£{{ item.total }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
