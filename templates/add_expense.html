{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Add Expense</h2>
    <form method="post" class="mb-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Save Expense</button>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary ml-2">Back to Dashboard</a>
    </form>
</div>
{% endblock %}
