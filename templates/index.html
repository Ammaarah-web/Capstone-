{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Map - Fantasy Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="homepage-page">
    <nav class="navbar">
        <div class="navbar-left">
            <span class="site-title">Money Map</span>
        </div>
        <div class="navbar-right" style="justify-content: flex-start; margin-left: 16vw; min-width: 320px;">
            {% url 'account_login' as login_url %}
            {% url 'account_signup' as signup_url %}
            <a class="nav-btn" style="margin-left: 0.5rem;" href="{{ login_url }}">Login</a>
            <a class="nav-btn" style="margin-left: 0.5rem;" href="{{ signup_url }}">Register</a>
        </div>
    </nav>

    <main class="center-content">
        <section class="welcome-section">
            <h1 class="welcome-heading">Welcome to Your Money Map</h1>
            <p class="welcome-desc">Track your expenses across the magical lands of your finances.</p>
            <div class="center-buttons">
                <form action="{{ login_url }}" method="get" style="display:inline;">
                    <button type="submit" class="main-btn nav-btn">Enter your Map</button>
                </form>
                <form action="{{ signup_url }}" method="get" style="display:inline;">
                    <button type="submit" class="main-btn nav-btn">Create Account</button>
                </form>
            </div>
            <div class="page-links">
                <a href="{{ login_url }}">Login</a> |
                <a href="{{ signup_url }}">Create an Account</a>
            </div>
        </section>
    </main>
</body>
</html>
