{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Map - Fantasy Expense Tracker</title>
    <!-- Link to fantasy/serif font (Google Fonts or fallback) -->
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}" >
    <style>
        .homepage-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('{% static "images/Money-map.png" %}') no-repeat center center/cover;
            z-index: 0;
        }
    </style>
</head>
<body>
    <!-- Homepage background image -->
    <div class="homepage-bg"></div>
    <!-- Overlay for darkening the background image -->
    <div class="background-overlay"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-left">
            <span class="site-title">Money Map</span>
        </div>
        <div class="navbar-right">
              <a class="nav-btn" href="{% url 'account_login' %}">Login</a>
              <a class="nav-btn" href="{% url 'account_signup' %}">Register</a>
        </div>
    </nav>

    <!-- Centered Welcome Section -->
    <main class="center-content">
        <section class="welcome-section">
            <h1 class="welcome-heading">Welcome to Your Money Map</h1>
            <p class="welcome-desc">Track your expenses across the magical lands of your finances.</p>
            <div class="center-buttons">
                 <a class="main-btn" href="{% url 'account_login' %}">Enter Map</a>
                 <a class="main-btn" href="{% url 'account_signup' %}">Create Account</a>
            </div>
            <!-- Links to other pages -->
            <div class="page-links">
                 <a href="{% url 'account_login' %}">Sign In</a> |
                 <a href="{% url 'account_signup' %}">Register</a>
            </div>
        </section>
    </main>
</body>
</html>
